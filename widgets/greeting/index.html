<style>
  .hero-banner {
    position: relative;
    width: 100%;
    height: 300px;
    border-radius: 8px;
    overflow: hidden;
  }

  .hero-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero-text-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 0 48px;
    box-sizing: border-box;
  }

  .slide-text {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: absolute;
    left: 48px;
    opacity: 0;
    transform: translateX(-40px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .slide-text.active {
    opacity: 1;
    transform: translateX(0);
  }

  .slide-text.exit {
    opacity: 0;
    transform: translateX(40px);
  }
</style>

<div class="hero-banner">
  <img src="banner.webp" alt="Banner" />
  <div class="hero-text-overlay">
    <span class="slide-text active" id="slide-1">Welcome to the Community!</span>
    <span class="slide-text" id="slide-2">We're excited to have you here!</span>
  </div>
</div>

<script type="module" src="app.js"></script>
